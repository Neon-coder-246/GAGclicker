<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="410.06188" height="221.91242" viewBox="0,0,410.06188,221.91242"><g transform="translate(-34.96905,-105.77476)"><g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill-rule="nonzero" stroke="none" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" style="mix-blend-mode: normal"><path d="M34.96906,311.53004c0,-54.50193 0,-156.47203 0,-187.96562c0,-9.46393 7.63111,-17.78966 17.02665,-17.78966c38.7976,0 301.23644,0 374.23017,0c11.93482,0 18.80505,6.30353 18.80505,17.02748c0,55.50111 0,155.94197 0,187.20344c0,9.41255 -6.28586,17.6815 -17.2807,17.6815c-71.35998,0 -341.08169,0 -378.04106,0c-8.23633,0 -14.74012,-5.96338 -14.74012,-16.15714z" fill="#000000" stroke-width="0"/><text transform="translate(187.10844,135.5739) scale(0.44812,0.44812)" font-size="40" xml:space="preserve" fill="#ffffff" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">How To Play</tspan></text><text transform="translate(69.26206,158.26511) scale(0.26808,0.26808)" font-size="40" xml:space="preserve" fill="#ffffff" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">• Click the Seeds. Use the shop to buy upgrades to get more seeds.</tspan><tspan x="0" dy="48px">• You get free rewards if you play for a long time. </tspan><tspan x="0" dy="48px">• The inventory has power ups:</tspan><tspan x="0" dy="48px">   2x Seeds gives you 2 times as much Seeds for 60 seconds.</tspan><tspan x="0" dy="48px">   Golden Seeds makes 5 golden Seeds appear on the screen.</tspan><tspan x="0" dy="48px">   Autoclicker makes you click automatically for 60 seconds.</tspan><tspan x="0" dy="48px">   You get power ups every 10 minutes automatically.</tspan><tspan x="0" dy="48px">• If you get achievements, then you can get power ups and</tspan><tspan x="0" dy="48px">  Seeds from the presents. There are also codes to get rewards!</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">❤️ + ⭐ if you liked this game! Have Fun! </tspan></text></g></g></svg>